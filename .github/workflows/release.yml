name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test + smoke (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build and smoke (amd64)
        shell: pwsh
        run: |
          go build -o shim.exe .
          if (-not (Test-Path shim.exe)) { throw "shim.exe not found" }

  build:
    name: build shim-${{ matrix.goarch }}.exe
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build shim.exe
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="shim-windows-${{ matrix.goarch }}.exe"
          go build -trimpath -ldflags "-s -w" -o "$out" .
          sha256sum "$out" | awk '{print $1}' > "$out.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: shim-windows-${{ matrix.goarch }}
          path: |
            shim-windows-${{ matrix.goarch }}.exe
            shim-windows-${{ matrix.goarch }}.exe.sha256

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: shim-windows-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
